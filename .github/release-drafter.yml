name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "docs"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
no-changes-template: "- No significant user-facing changes in this release."

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
  default: patch

autolabeler:
  - label: "docs"
    files:
      - "README.md"
      - "docs/**"
      - ".github/**"
  - label: "frontend"
    files:
      - "src/components/**"
      - "src/styles.css"
  - label: "data"
    files:
      - "src/data/**"
  - label: "router"
    files:
      - "src/router.tsx"
      - "src/router-views.tsx"
