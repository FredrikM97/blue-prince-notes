name: Deploy To GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute BASE_PATH
        id: base_path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base_path.outputs.base_path }}
        run: npm run build

      - name: Prepare static artifact
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist

          if [[ -f dist/client/index.html ]]; then
            SRC_DIR="dist/client"
          elif [[ -f dist/index.html ]]; then
            SRC_DIR="dist"
          elif [[ -f .output/public/index.html ]]; then
            SRC_DIR=".output/public"
          else
            echo "Could not find static output directory."
            echo "Checked: dist/client, dist, .output/public"
            ls -la
            [[ -d dist ]] && find dist -maxdepth 3 -type f | head -n 50 || true
            [[ -d .output ]] && find .output -maxdepth 4 -type f | head -n 50 || true
            exit 1
          fi

          cp -R "$SRC_DIR"/. pages-dist/

          if [[ ! -f pages-dist/index.html ]]; then
            echo "index.html not found in prepared artifact directory"
            find pages-dist -maxdepth 3 -type f | head -n 50 || true
            exit 1
          fi

          cp pages-dist/index.html pages-dist/404.html
          touch pages-dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
