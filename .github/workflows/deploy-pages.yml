name: Deploy To GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute BASE_PATH
        id: base_path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base_path.outputs.base_path }}
        run: npm run build

      - name: Prepare static artifact
        env:
          BASE_PATH: ${{ steps.base_path.outputs.base_path }}
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist

          if [[ -f dist/client/index.html ]]; then
            SRC_DIR="dist/client"
          elif [[ -f dist/index.html ]]; then
            SRC_DIR="dist"
          elif [[ -f .output/public/index.html ]]; then
            SRC_DIR=".output/public"
          else
            if [[ -d dist/client/assets ]]; then
              SRC_DIR="dist/client"
            else
              echo "Could not find static output directory."
              echo "Checked: dist/client, dist, .output/public"
              ls -la
              [[ -d dist ]] && find dist -maxdepth 3 -type f | head -n 50 || true
              [[ -d .output ]] && find .output -maxdepth 4 -type f | head -n 50 || true
              exit 1
            fi
          fi

          cp -R "$SRC_DIR"/. pages-dist/

          if [[ ! -f pages-dist/index.html ]]; then
            ENTRY_JS=$(find pages-dist/assets -maxdepth 1 -type f -name 'index-*.js' | head -n 1 || true)
            ENTRY_CSS=$(find pages-dist/assets -maxdepth 1 -type f -name 'styles-*.css' | head -n 1 || true)

            if [[ -z "$ENTRY_JS" ]]; then
              echo "index.html missing and no index-*.js entry found under pages-dist/assets"
              find pages-dist -maxdepth 3 -type f | head -n 100 || true
              exit 1
            fi

            ENTRY_JS_BASENAME=$(basename "$ENTRY_JS")
            ENTRY_CSS_BASENAME=$(basename "$ENTRY_CSS")

            if [[ -n "$ENTRY_CSS" ]]; then
              CSS_TAG="<link rel=\"stylesheet\" href=\"${BASE_PATH}assets/${ENTRY_CSS_BASENAME}\">"
            else
              CSS_TAG=""
            fi

            {
              printf '%s\n' '<!doctype html>'
              printf '%s\n' '<html lang="en">'
              printf '%s\n' '  <head>'
              printf '%s\n' '    <meta charset="UTF-8" />'
              printf '%s\n' '    <meta name="viewport" content="width=device-width, initial-scale=1.0" />'
              printf '%s\n' "    ${CSS_TAG}"
              printf '%s\n' '  </head>'
              printf '%s\n' '  <body>'
              printf '%s\n' '    <div id="root"></div>'
              printf '%s\n' "    <script type=\"module\" src=\"${BASE_PATH}assets/${ENTRY_JS_BASENAME}\"></script>"
              printf '%s\n' '  </body>'
              printf '%s\n' '</html>'
            } > pages-dist/index.html
          fi

          cp pages-dist/index.html pages-dist/404.html
          touch pages-dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
